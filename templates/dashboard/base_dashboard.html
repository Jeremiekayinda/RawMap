{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard — RawMap{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/rawmap-design-system.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard/simulator.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="rm-dashboard">
    <aside class="rm-sidebar">
        <div class="rm-sidebar-brand">
            <img src="{% static 'images/rawmap-logo-light.svg' %}" alt="" height="28">
            <span>Raw<span class="rm-highlight">Map</span></span>
        </div>
        <ul class="rm-sidebar-nav">
            <li><a href="{% url 'affluence:simulator' %}" class="{% block nav_simulator %}active{% endblock %}"><i class="bi bi-sliders"></i> Simulateur</a></li>
            <li><a href="{% url 'core:home' %}"><i class="bi bi-map"></i> Carte</a></li>
            <li><a href="{% url 'admin:index' %}"><i class="bi bi-shield-lock"></i> Admin Django</a></li>
        </ul>
        <p class="small text-white-50 mb-0 px-2">&copy; Rawbank RDC</p>
    </aside>
    <main class="rm-dashboard-main">
        {% block dashboard_content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
